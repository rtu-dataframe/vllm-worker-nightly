name: Build vLLM Worker (Qwen3.5)

on:
  workflow_dispatch:  # avvia manualmente da GitHub → Actions → Run workflow

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: "https://github.com/runpod-workers/worker-vllm.git"
          build-args: VLLM_NIGHTLY=true
          push: true
          tags: |
            simonefardella/worker-vllm-qwen35:latest
            simonefardella/worker-vllm-qwen35:nightly-${{ github.run_id }}
