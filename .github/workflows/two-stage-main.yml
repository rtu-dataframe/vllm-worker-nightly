name: Build vLLM Worker (Qwen3.5)

on:
  workflow_dispatch:  # avvia manualmente da GitHub → Actions → Run workflow

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 1: build worker-vllm with nightly vLLM and push as a temporary base tag.
      # We PUSH (not just load) so that step 2 can pull it as a regular registry image —
      # this avoids the buildx-vs-docker-daemon context mismatch that would occur if we
      # only used `load: true` here and then ran `docker build` in a `run:` step.
      - name: Build and push base worker-vllm (nightly)
        uses: docker/build-push-action@v6
        with:
          context: "https://github.com/runpod-workers/worker-vllm.git"
          build-args: VLLM_NIGHTLY=true
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/worker-vllm-qwen35:base-${{ github.run_id }}

      # Step 2: add ninja on top and push the final tagged images.
      # Both steps use docker/build-push-action (buildx), so no context mismatch.
      - name: Add ninja and push final image
        uses: docker/build-push-action@v6
        with:
          context: .github/docker
          file: .github/docker/Dockerfile.vllm-qwen35
          build-args: BASE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/worker-vllm-qwen35:base-${{ github.run_id }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/worker-vllm-qwen35:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/worker-vllm-qwen35:nightly-${{ github.run_id }}
