name: Build vLLM Worker (Qwen3.5)

on:
  workflow_dispatch:  # avvia manualmente da GitHub → Actions → Run workflow

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 1: build worker-vllm with nightly vLLM, load locally (no push yet)
      - name: Build base worker-vllm (nightly)
        uses: docker/build-push-action@v6
        with:
          context: "https://github.com/runpod-workers/worker-vllm.git"
          build-args: VLLM_NIGHTLY=true
          push: false
          load: true
          tags: worker-vllm-nightly:local

      # Step 2: add ninja-build on top and push final image
      - name: Add ninja-build and push
        run: |
          docker build \
            -t simonefardella/worker-vllm-qwen35:latest \
            -t simonefardella/worker-vllm-qwen35:nightly-${{ github.run_id }} \
            - <<'EOF'
          FROM worker-vllm-nightly:local
          RUN apt-get update \
           && apt-get install -y --no-install-recommends ninja-build \
           && rm -rf /var/lib/apt/lists/*
          EOF
          docker push simonefardella/worker-vllm-qwen35:latest
          docker push simonefardella/worker-vllm-qwen35:nightly-${{ github.run_id }}
