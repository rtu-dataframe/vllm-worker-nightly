name: Build vLLM Worker (Qwen3.5-27B)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 1: build base worker-vllm with nightly (gets PyTorch 2.10 + deps)
      - name: Build and push base worker-vllm
        uses: docker/build-push-action@v6
        with:
          context: "https://github.com/runpod-workers/worker-vllm.git"
          build-args: VLLM_NIGHTLY=true
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/worker-vllm-qwen35:base-${{ github.run_id }}

      # Step 2: pin vLLM 0.17.0 on top
      - name: Pin vLLM 0.17.0 and push final image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.vllm-qwen35
          build-args: |
            BASE_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/worker-vllm-qwen35:base-${{ github.run_id }}
            VLLM_VERSION=0.17.0
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/worker-vllm-qwen35:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/worker-vllm-qwen35:v0.17.0-${{ github.run_id }}
